<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEIJING PUFF MARKET</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cyber: {
              bg: '#0a0b10',
              panel: '#12131a',
              border: '#1f2130',
              neon: '#00ffaa',
              magenta: '#ff0055',
              text: '#f0f2f5',
              muted: '#626880'
            }
          },
          fontFamily: {
            display: ['Orbitron', 'sans-serif'],
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@700&display=swap');
    body { background-color: #0a0b10; color: #f0f2f5; font-family: 'Inter', sans-serif; }
    .cyber-btn {
      background: linear-gradient(135deg, #00ffaa 0%, #00b377 100%);
      color: #0a0b10;
      font-weight: 700;
      box-shadow: 0 0 15px rgba(0, 255, 170, 0.4);
      transition: all 0.3s ease;
    }
    .cyber-btn:hover {
      box-shadow: 0 0 25px rgba(0, 255, 170, 0.8);
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

  <!-- Шапка сайта -->
  <header class="border-b border-cyber-border bg-cyber-panel/80 backdrop-blur sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-display uppercase tracking-wider text-cyber-neon">BEIJING PUFF</h1>
        <p class="text-xs text-cyber-muted uppercase tracking-widest">Cyber Vape • 北京</p>
      </div>
      <button onclick="toggleCart()" class="relative border border-cyber-neon text-cyber-neon px-5 py-2 rounded-md font-medium hover:bg-cyber-neon hover:text-cyber-bg transition flex items-center gap-2">
        🛍️ Корзина
        <span id="cart-count" class="bg-cyber-magenta text-white text-xs px-2 py-0.5 rounded-full">0</span>
      </button>
    </div>
  </header>

  <!-- Главный контейнер для товаров -->
  <main class="max-w-7xl mx-auto px-4 py-10 w-full flex-grow">
    <div id="products-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- Сюда товары сгенерируются из app.js -->
    </div>
  </main>

  <!-- Подвал -->
  <footer class="border-t border-cyber-border bg-cyber-panel py-6 text-center text-sm text-cyber-muted">
    &copy; 2026 BEIJING PUFF MARKET. All rights reserved.
  </footer>

  <!-- Модальное окно корзины -->
  <div id="cart-modal" class="fixed inset-0 z-50 hidden bg-black/70 backdrop-blur-sm flex justify-end">
    <div class="bg-cyber-panel w-full max-w-md h-full p-6 flex flex-col justify-between border-l border-cyber-border shadow-2xl">
      <div>
        <div class="flex justify-between items-center mb-6 border-b border-cyber-border pb-4">
          <h2 class="text-2xl font-display uppercase text-cyber-neon">Корзина</h2>
          <button onclick="toggleCart()" class="text-cyber-muted hover:text-cyber-magenta text-xl">&times;</button>
        </div>

        <!-- Список выбранных позиций -->
        <div id="cart-items" class="space-y-4 max-h-[40vh] overflow-y-auto mb-6 pr-2">
          <!-- Рендерится из JS -->
        </div>

        <!-- Форма отправки заказа -->
        <form id="order-form" onsubmit="placeOrder(event)" class="space-y-4 border-t border-cyber-border pt-4">
          <div>
            <label class="block text-xs uppercase text-cyber-muted mb-1">Способ связи:</label>
            <select id="contact-type" onchange="toggleContactFields()" class="w-full bg-cyber-bg border border-cyber-border p-2.5 rounded text-cyber-text focus:outline-none focus:border-cyber-neon">
              <option value="telegram">Telegram</option>
              <option value="wechat">WeChat</option>
            </select>
          </div>

          <!-- Поле для Telegram -->
          <div id="tg-field">
            <label class="block text-xs uppercase text-cyber-muted mb-1">Ваш Telegram Username:</label>
            <input type="text" id="tg-username" placeholder="username (без @)" class="w-full bg-cyber-bg border border-cyber-border p-2.5 rounded text-cyber-text focus:outline-none focus:border-cyber-neon">
          </div>

          <!-- Поле для WeChat -->
          <div id="wechat-field" class="hidden">
            <label class="block text-xs uppercase text-cyber-muted mb-1">Ваш WeChat ID:</label>
            <input type="text" id="wechat-id" placeholder="wxid_..." class="w-full bg-cyber-bg border border-cyber-border p-2.5 rounded text-cyber-text focus:outline-none focus:border-cyber-neon">
          </div>
        </form>
      </div>

      <!-- Кнопка заказа и Итого -->
      <div class="border-t border-cyber-border pt-4 mt-6">
        <div class="flex justify-between items-center mb-4">
          <span class="text-cyber-muted uppercase text-sm">Итого к оплате:</span>
          <span class="text-2xl font-bold text-cyber-neon"><span id="cart-total">0</span> ¥</span>
        </div>
        <button type="submit" form="order-form" class="cyber-btn w-full py-3.5 rounded text-center uppercase tracking-wider font-bold">
          Оформить заказ
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
